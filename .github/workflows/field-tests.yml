name: Field Tests

on:
  workflow_dispatch:
    inputs:
      forge-spec:
        description: Forge package spec to test
        required: true
        default: "file:$GITHUB_WORKSPACE"
      templates:
        description: Comma-separated templates
        required: true
        default: "minimal-web,nuxt-web"
  schedule:
    - cron: "0 7 * * 1"

jobs:
  public-create-smoke:
    name: public npm create smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Create app through public npm create
        run: npm create forgeos-app@alpha smoke-app -- --template minimal-web --no-install --no-git

      - name: Verify generated app uses ForgeOS alpha alias
        working-directory: smoke-app
        run: node -e "const pkg=require('./package.json'); if (pkg.dependencies.forge !== 'npm:forgeos@alpha') throw new Error('expected forge alias to npm:forgeos@alpha')"

  app-matrix:
    name: ${{ matrix.os }} Node ${{ matrix.node-version }} ${{ matrix.package-manager }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22, 24]
        package-manager: [npm, pnpm, yarn, bun]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable Corepack
        if: matrix.package-manager == 'pnpm' || matrix.package-manager == 'yarn'
        run: corepack enable

      - name: Install Bun
        if: matrix.package-manager == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install workspace dependencies
        run: npm install --ignore-scripts --package-lock=false

      - name: Run generated app field test
        shell: bash
        run: |
          SPEC="${{ inputs['forge-spec'] || 'file:$GITHUB_WORKSPACE' }}"
          node scripts/field-test-forgeos.mjs \
            --package-managers "${{ matrix.package-manager }}" \
            --templates "${{ inputs.templates || 'minimal-web,nuxt-web' }}" \
            --forge-spec "$SPEC" \
            --install \
            --runtime-probes \
            --json \
            --write-report "field-reports/${{ matrix.os }}-node${{ matrix.node-version }}-${{ matrix.package-manager }}.json" \
            --timeout-ms 180000

      - name: Upload field-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: field-report-${{ matrix.os }}-node${{ matrix.node-version }}-${{ matrix.package-manager }}
          path: field-reports/*.json
          if-no-files-found: ignore
