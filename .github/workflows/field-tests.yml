name: Field Tests

on:
  workflow_dispatch:
    inputs:
      forge-spec:
        description: Forge package spec to test
        required: true
        default: "file:$GITHUB_WORKSPACE"
      templates:
        description: Comma-separated templates
        required: true
        default: "minimal-web"
  schedule:
    - cron: "0 7 * * 1"

jobs:
  app-matrix:
    name: ${{ matrix.os }} Node ${{ matrix.node-version }} ${{ matrix.package-manager }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22, 24]
        package-manager: [npm, pnpm, yarn, bun]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable Corepack
        if: matrix.package-manager == 'pnpm' || matrix.package-manager == 'yarn'
        run: corepack enable

      - name: Install Bun
        if: matrix.package-manager == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install workspace dependencies
        run: npm install --ignore-scripts --package-lock=false

      - name: Run generated app field test
        shell: bash
        run: |
          SPEC="${{ inputs['forge-spec'] || 'file:$GITHUB_WORKSPACE' }}"
          node scripts/field-test-forgeos.mjs \
            --package-managers "${{ matrix.package-manager }}" \
            --templates "${{ inputs.templates || 'minimal-web' }}" \
            --forge-spec "$SPEC" \
            --install \
            --json \
            --timeout-ms 180000
