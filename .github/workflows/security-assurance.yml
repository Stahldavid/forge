name: Security Assurance

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  security-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: forge_security
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/forge_security
      FORGE_MOCK_AI: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Prepare evidence directory
        run: mkdir -p security/evidence/latest

      - name: Generate drift check
        run: node ./bin/forge.mjs generate --check | tee security/evidence/latest/generate-check.txt

      - name: Forge guardrails
        run: node ./bin/forge.mjs check --json | tee security/evidence/latest/forge-check.json

      - name: Auth config check
        run: node ./bin/forge.mjs auth check --json | tee security/evidence/latest/auth-check.json

      - name: Secret registry check
        run: node ./bin/forge.mjs secrets check --json | tee security/evidence/latest/secrets-check.json

      - name: RLS check
        run: node ./bin/forge.mjs rls check --json | tee security/evidence/latest/rls-check.json

      - name: Strict verification
        run: node ./bin/forge.mjs verify --strict --script-timeout-ms 120000 | tee security/evidence/latest/verify-strict.txt

      - name: Security assurance tests
        run: node ./bin/forge-bun.mjs test tests/security --timeout 120000 | tee security/evidence/latest/security-tests.txt

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-evidence
          path: security/evidence/latest
          if-no-files-found: error
