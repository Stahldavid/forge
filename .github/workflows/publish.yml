name: Publish to npm

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "forgeos-v*"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changesets:
    name: Changesets release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: forge_publish
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    env:
      FORGE_MOCK_AI: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify release toolchain
        run: node --version && npm --version && bun --version

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Generate release artifacts
        run: npm run forge -- generate

      - name: Security proof
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/forge_publish
          AI_GATEWAY_API_KEY: forge-ci-redacted-ai-gateway-key
          ANTHROPIC_API_KEY: forge-ci-redacted-anthropic-key
          OPENAI_API_KEY: forge-ci-redacted-openai-key
        run: npm run forge -- security prove --db postgres --json

      - name: RLS mutation proof
        run: npm run forge -- rls mutate-test --json

      - name: Release evidence and SBOM
        run: npm run release:evidence

      - name: Test
        run: npm test

      - name: Restore workspace after tests
        run: |
          git restore .
          git clean -fd

      - name: Regenerate release artifacts
        run: npm run forge -- generate

      - name: Smoke packed package
        run: npm run release:smoke

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Summarize outcome
        if: always()
        run: |
          if [[ "${{ steps.changesets.outputs.published }}" == "true" ]]; then
            echo "::notice::Published packages: ${{ steps.changesets.outputs.publishedPackages }}"
          elif [[ "${{ steps.changesets.outputs.hasChangesets }}" == "true" ]]; then
            echo "::notice::Pending changesets: release PR opened or updated. Merge it to publish."
          else
            echo "::notice::No pending changesets and nothing to publish."
          fi

  manual-publish:
    name: Manual publish
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: forge_publish
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    permissions:
      contents: read
      id-token: write
    env:
      FORGE_MOCK_AI: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#forgeos-v}"
          TAG_VERSION="${TAG_VERSION#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$TAG_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "::error::Tag version '$TAG_VERSION' does not match package.json version '$PACKAGE_VERSION'."
            exit 1
          fi
          echo "Version check OK: tag=$TAG_VERSION"

      - name: Check npm package version
        id: npm-version
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --json >/tmp/forgeos-npm-version.json 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npm; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${PACKAGE_NAME}@${PACKAGE_VERSION} is not published yet; continuing."
          fi

      - name: Setup Bun
        if: steps.npm-version.outputs.exists != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        if: steps.npm-version.outputs.exists != 'true'
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        if: steps.npm-version.outputs.exists != 'true'
        run: npm run typecheck

      - name: Generate release artifacts
        if: steps.npm-version.outputs.exists != 'true'
        run: npm run forge -- generate

      - name: Security proof
        if: steps.npm-version.outputs.exists != 'true'
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/forge_publish
          AI_GATEWAY_API_KEY: forge-ci-redacted-ai-gateway-key
          ANTHROPIC_API_KEY: forge-ci-redacted-anthropic-key
          OPENAI_API_KEY: forge-ci-redacted-openai-key
        run: npm run forge -- security prove --db postgres --json

      - name: RLS mutation proof
        if: steps.npm-version.outputs.exists != 'true'
        run: npm run forge -- rls mutate-test --json

      - name: Release evidence and SBOM
        if: steps.npm-version.outputs.exists != 'true'
        run: npm run release:evidence

      - name: Test
        if: steps.npm-version.outputs.exists != 'true'
        run: npm test

      - name: Restore workspace after tests
        if: steps.npm-version.outputs.exists != 'true'
        run: |
          git restore .
          git clean -fd

      - name: Regenerate release artifacts
        if: steps.npm-version.outputs.exists != 'true'
        run: npm run forge -- generate

      - name: Smoke packed package
        if: steps.npm-version.outputs.exists != 'true'
        run: npm run release:smoke

      - name: Publish to npm
        if: steps.npm-version.outputs.exists != 'true'
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: npm publish --access public --tag alpha

      - name: Summarize skipped publish
        if: steps.npm-version.outputs.exists == 'true'
        run: echo "::notice::Package version already exists on npm. No publish was attempted."
