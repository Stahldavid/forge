name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Node CLI smoke
        run: |
          node ./bin/forge.mjs inspect framework --json
          node ./bin/forge.mjs dev --once --json

      - name: Typecheck
        run: bun run typecheck

      - name: Unit and integration tests
        run: bun test

      - name: Generate committed compiler output
        run: bun run forge generate

      - name: Verify compiler workspace
        run: bun run forge verify --skip-tests

      - name: Setup basic example
        run: node scripts/setup-example.mjs

      - name: Generate example output
        working-directory: examples/basic-forge-app
        run: bun ../../src/forge/cli/main.ts generate

      - name: Example drift check
        working-directory: examples/basic-forge-app
        run: bun ../../src/forge/cli/main.ts generate --check

      - name: package manager template smoke
        run: |
          mkdir -p "$RUNNER_TEMP/forge-template-smoke"
          cd "$RUNNER_TEMP/forge-template-smoke"
          for pm in npm pnpm yarn bun; do
            node "$GITHUB_WORKSPACE/bin/forge.mjs" new "$pm-smoke" --template minimal-web --package-manager "$pm" --no-install --no-git
            grep "\"packageManager\": \"$pm@" "$pm-smoke/package.json"
          done
